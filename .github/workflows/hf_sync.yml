name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  # Allows manual triggering
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Prepare Clean Hugging Face Deployment
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Create a temporary clean deploy directory
          mkdir -p ../hf_deploy
          cp -r src ../hf_deploy/src
          cp requirements.txt ../hf_deploy/requirements.txt
          cp Dockerfile ../hf_deploy/Dockerfile

          # 2. Dynamically generate the mandatory Hugging Face Space metadata README
          cat << 'EOF' > ../hf_deploy/README.md
          ---
          title: Stealth FER Console
          emoji: 📸
          colorFrom: cyan
          colorTo: slate
          sdk: docker
          app_port: 7860
          pinned: false
          ---

          # Stealth Console // Facial Emotion Recognition Dashboard
          A state-of-the-art, high-precision Facial Emotion Recognition pipeline served in an interactive cyberpunk skeuomorphic console!
          EOF

          # 3. Initialize a fresh, history-free Git repository
          cd ../hf_deploy
          git init
          git checkout -b main
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # 4. Add clean files (NO large models/ directory)
          git add .
          git commit -m "deploy: Release clean skeuomorphic dashboard with HF metadata"

          # 5. Push clean history-free code to Hugging Face
          git remote add hf https://ShreyasVavley:$HF_TOKEN@huggingface.co/spaces/ShreyasVavley/facial-emotion-console
          git push --force hf main
